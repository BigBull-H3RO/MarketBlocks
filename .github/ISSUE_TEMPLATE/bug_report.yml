name: 🐞 Bug Report
description: Report an issue you've encountered
labels: [ bug ]
body:
  - type: markdown
    attributes:
      value: |
        # 📋 Checklist
        
        ### Thank you for taking your time to report this bug!
        
        **Before reporting, please ensure that:**
        - You have **checked existing issues** to ensure that the bug has not already been reported. 
        If a similar issue exists, please add any additional information there instead of creating a new report.
        - You are using the **latest** available version of **MarketBlocks**.
        - You've installed a **minimal set of mods** required to reproduce the issue. 
        Issues with modpacks and excessive amount of mods will *not* be accepted, as they take a long time to diagnose.
        Knowing which mods are causing problems allows us to focus on fixing the issue as soon as possible.  
        If you're unsure which mods might be at fault, try using [binary search](https://www.reddit.com/r/feedthebeast/comments/evpy6r/tips_for_modpack_authors_how_to_find_misbehaving/) - removing half of installed mods repeatedly until the faulty mod is found.

  - type: dropdown
    id: minecraft_version
    attributes:
      label: Minecraft version
      description: What version of Minecraft are you running? Please note that only the versions listed below are supported. If you're running an outdated version, update to receive support.
      options:
        - "1.21"
        - "1.21.1"
      default: 0
    validations:
      required: true
  - type: input
    id: neoforge_version
    attributes:
      label: NeoForge version
      description: "Please provide the exact NeoForge version (for example: 21.1.172)."
      placeholder: "21.1.x"
    validations:
      required: true
  - type: input
    id: marketblocks_version
    attributes:
      label: MarketBlocks version
      description: "Please provide the exact MarketBlocks mod version."
      placeholder: "0.1-1.21.1"
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: "What should happen instead?"
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: "What happened instead?"
    validations:
      required: true
  - type: textarea
    id: repro_steps
    attributes:
      label: Steps to reproduce
      description: |
        How do you trigger this bug? Please walk us through it step by step.
        If applicable, add screenshots, or videos to help explain your problem.
      value: |
        1.
        2.
        3.
        ...
    validations:
      required: true
  - type: input
    id: debug_log
    attributes:
      label: Debug log link
      description: |
        If applicable, provide a link to `debug.log`.
        Please upload logs to an external paste site such as [GitHub Gist](https://gist.github.com/) (recommended), [Ubuntu Pastebin](https://paste.ubuntu.com/) or [Pastebin](http://pastebin.com).
  - type: input
    id: crash_report
    attributes:
      label: Crash report link (if available)
      description: "Provide a link to the crash report file, if a crash occurred."
  - type: textarea
    id: environment
    attributes:
      label: Environment and additional context
      description: "Include OS, client/server setup, and any other mods that are active during reproduction."
    validations:
      required: true
